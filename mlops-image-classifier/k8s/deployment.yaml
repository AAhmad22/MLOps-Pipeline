apiVersion: apps/v1
kind: Deployment
metadata:
  name: image-classifier
  labels:
    app: image-classifier
spec:
  replicas: 2
  selector:
    matchLabels:
      app: image-classifier
  template:
    metadata:
      labels:
        app: image-classifier
      annotations:
        # Tells Prometheus to scrape these pods.
        prometheus.io/scrape: "true"
        prometheus.io/path: "/metrics"
        prometheus.io/port: "8000"
    spec:
      containers:
        - name: api
          # Replace with your registry image, e.g.
          # ghcr.io/<your-user>/mlops-image-classifier:latest
          image: IMAGE_PLACEHOLDER
          ports:
            - containerPort: 8000
          env:
            - name: CLASS_NAMES
              value: "cat,dog"
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 15
